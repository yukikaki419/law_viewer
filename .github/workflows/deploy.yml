name: Deploy Vue Site to Pages

on:
  push:
    branches: ["main"] # mainへのpushをトリガーにする

  # 手動実行も可能にする設定
  workflow_dispatch:

# GitHub Pagesへの書き込み権限を与える
permissions:
  contents: read
  pages: write
  id-token: write

# 同時に複数のデプロイが走らないように制御
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build_and_deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: v22.20.0
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Viteのデフォルト出力先は 'dist' です
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
